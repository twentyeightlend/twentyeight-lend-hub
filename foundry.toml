[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
fs_permissions = [{ access = "read", path = "./"}]

[invariant]
runs = 256
depth = 50
fail_on_revert = false

[fmt]
line_length = 110
tab_width = 4
quote_style = "double"
number_underscore = "thousands"

# HyperEVM mainnet (chainId 999). Deploy requires BIG BLOCKS (evmUserModify usingBigBlocks).
[rpc_endpoints]
hyperevm = "https://rpc.hyperliquid.xyz/evm"

[etherscan]
hyperevm = { key = "${HYPERSCAN_KEY}", url = "https://www.hyperscan.com/api", chain = 999 }
